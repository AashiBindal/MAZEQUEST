<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Maze Quest | Welcome</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/welcome.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Background -->

    <div class="background"></div>

    <!-- Fog -->
    <div class="fog"></div>

    <!-- Particles -->
    <div id="particles"></div>

    <!-- Mouse Glow -->
    <div class="cursor-glow"></div>

    <!-- Main Container -->

    <div class="welcome-container">

        <!-- Logo -->

        <div class="logo-section">

            <h1 class="logo heading glow">

                MAZE
                <span>QUEST</span>

            </h1>

            <p class="subtitle">

                Explore • Solve • Escape

            </p>

        </div>

        <!-- Menu -->

        <div class="menu">

            <!-- Continue -->
            <button class="menu-btn continue-btn">

                ▶ CONTINUE

            </button>

            <!-- New Game -->
            <button class="menu-btn play-btn" id="newGame">

                ✨ NEW GAME

            </button>

            <!-- Login -->
            <button class="menu-btn" id="login">

                👤 LOGIN

            </button>

            <!-- Leaderboard -->
            <button class="menu-btn" id="leaderboard">

                🏆 LEADERBOARD

            </button>

            <!-- Settings -->
            <button class="menu-btn" id="settings">

                ⚙ SETTINGS

            </button>

            <!-- Exit -->
            <button class="menu-btn exit" id="exit">

                🚪 EXIT

            </button>

        </div>

        <!-- Version -->

        <div class="version">

            Maze Quest v1.0

        </div>

    </div>

    <!-- Background Music (Future) -->

    <audio id="bgMusic" loop>
        <source src="../assets/sounds/menu.mp3" type="audio/mpeg">
    </audio>

    <!-- Button Click Sound (Future) -->

    <audio id="clickSound">
        <source src="../assets/sounds/click.mp3" type="audio/mpeg">
    </audio>

    <!-- JS -->

    <script src="../js/welcome.js"></script>

</body>

</html>
