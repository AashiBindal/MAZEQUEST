<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Maze Quest | Login</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/login.css">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Background -->

    <div class="background"></div>

    <div class="fog"></div>

    <div id="particles"></div>

    <div class="cursor-glow"></div>

    <!-- Login Card -->

    <div class="login-card">

        <h1 class="logo heading glow">
            MAZE <span>QUEST</span>
        </h1>

        <p class="subtitle">
            Create Your Explorer Profile
        </p>

        <!-- Username -->

        <input
            type="text"
            id="username"
            class="input"
            placeholder="Enter Player Name">

        <!-- Email -->

        <input
            type="email"
            id="email"
            class="input"
            placeholder="Enter Email (Optional)">

        <!-- Avatar -->

        <h3 class="avatar-title">
            Choose Your Avatar
        </h3>

        <div class="avatar-container">

            <div class="avatar active">🧙</div>
            <div class="avatar">🥷</div>
            <div class="avatar">🧝</div>
            <div class="avatar">🤖</div>

        </div>

        <!-- Remember -->

        <label class="remember">

            <input type="checkbox" id="remember">

            Remember Me

        </label>

        <!-- Buttons -->

        <button id="startBtn" class="btn btn-primary">

            🚀 START ADVENTURE

        </button>

        <button id="backBtn" class="btn btn-gold">

            ⬅ BACK

        </button>

    </div>

    <script src="../js/login.js"></script>

</body>

</html>
